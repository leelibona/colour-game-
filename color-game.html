<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color Guess</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181b;
      --border: #2a2a2e;
      --text: #f4f4f5;
      --muted: #71717a;
      --accent: #e4e4e7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
   font-family: 'Space Mono', monospace;
   font-size: clamp(1.1rem, 3vw, 1.4rem);
   font-weight: 700;
   letter-spacing: 0.15em;
   text-transform: uppercase;
   color: var(--accent);
 }

    header p {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
    }

    .swatch-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 2.5rem;
    }

    .swatch {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      transition: background 0.4s ease;
      box-shadow: 0 0 0 1px var(--border), 0 8px 32px rgba(0,0,0,0.5);
    }

    .rgb-label {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.65rem;
      width: 100%;
      max-width: 420px;
      margin-bottom: 2rem;
    }

    .option-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 0.4rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.15s ease;
    }

    .option-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--text);
      transform: translateY(-1px);
    }

    .option-btn.correct {
      border-color: #4ade80;
      color: #4ade80;
      background: rgba(74, 222, 128, 0.06);
    }

    .option-btn.wrong {
      border-color: #f87171;
      color: #f87171;
      background: rgba(248, 113, 113, 0.06);
    }

    .option-btn:disabled {
      cursor: default;
      opacity: 0.6;
    }

    .feedback {
      font-size: 0.9rem;
      font-weight: 500;
      min-height: 1.4rem;
      text-align: center;
      letter-spacing: 0.03em;
      transition: opacity 0.3s;
    }

    .feedback.correct { color: #4ade80; }
    .feedback.wrong   { color: #f87171; }
    .feedback.empty   { opacity: 0; }

    .stats {
      display: flex;
      gap: 2.5rem;
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .stat-num {
      font-family: 'Space Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .next-btn {
      display: none;
      margin-top: 1.5rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1.6rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
    }

    .next-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .next-btn.visible { display: inline-block; }

    .streak {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: #fbbf24;
      letter-spacing: 0.08em;
      min-height: 1.1rem;
      margin-top: 0.3rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Guess the Colour </h1>
    <p>Match the RGB value to the correct colour</p>
  </header>

  <div class="swatch-wrap">
    <div class="swatch" id="swatch"></div>
    <div class="rgb-label" id="rgb-label"></div>
  </div>

  <div class="options" id="options"></div>

  <div class="feedback empty" id="feedback"></div>
  <div class="streak" id="streak"></div>

  <button class="next-btn" id="next-btn">NEXT →</button>

  <div class="stats">
    <div class="stat">
      <span class="stat-num" id="score">0</span>
      <span class="stat-label">Score</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="total">0</span>
      <span class="stat-label">Played</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="best">0</span>
      <span class="stat-label">Best Streak</span>
    </div>
  </div>
    <script>
  const swatchEl   = document.getElementById('swatch');
  const rgbLabel   = document.getElementById('rgb-label');
  const optionsEl  = document.getElementById('options');
  const feedbackEl = document.getElementById('feedback');
  const streakEl   = document.getElementById('streak');
  const nextBtn    = document.getElementById('next-btn');
  const scoreEl    = document.getElementById('score');
  const totalEl    = document.getElementById('total');
  const bestEl     = document.getElementById('best');

  let score = 0, total = 0, streak = 0, bestStreak = 0;
  let correctColor = null;

  function randByte() {
    return Math.floor(Math.random() * 256);
  }

  function randomColor() {
    return { r: randByte(), g: randByte(), b: randByte() };
  }

  function toRGB(c) {
    return `rgb(${c.r}, ${c.g}, ${c.b})`;
  }

  function toLabel(c) {
    return `rgb(${c.r}, ${c.g}, ${c.b})`;
  }

  function nearbyColor(c) {
    const offset = () => Math.floor(Math.random() * 80) - 40;
    const clamp  = v => Math.max(0, Math.min(255, v));
    return {
      r: clamp(c.r + offset()),
      g: clamp(c.g + offset()),
      b: clamp(c.b + offset())
    };
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function newRound() {
    correctColor = randomColor();

    const options = shuffle([
      { color: correctColor, isCorrect: true },
      { color: nearbyColor(correctColor), isCorrect: false },
      { color: nearbyColor(correctColor), isCorrect: false },
    ]);

    swatchEl.style.background = toRGB(correctColor);
    rgbLabel.textContent = toLabel(correctColor);

    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback empty';
    streakEl.textContent = '';
    nextBtn.classList.remove('visible');

    optionsEl.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = toLabel(opt.color);
      btn.addEventListener('click', () => handleGuess(opt.isCorrect, btn));
      optionsEl.appendChild(btn);
    });
  }

  function handleGuess(isCorrect, clickedBtn) {
    total++;
    totalEl.textContent = total;

    [...optionsEl.querySelectorAll('.option-btn')].forEach(b => b.disabled = true);

    [...optionsEl.querySelectorAll('.option-btn')].forEach(b => {
      if (b.textContent === toLabel(correctColor)) b.classList.add('correct');
    });

    if (isCorrect) {
      score++;
      streak++;
      if (streak > bestStreak) bestStreak = streak;
      scoreEl.textContent = score;
      bestEl.textContent = bestStreak;
      feedbackEl.textContent = '✓ Correct!';
      feedbackEl.className = 'feedback correct';
      if (streak >= 3) streakEl.textContent = `🔥 ${streak} in a row!`;
    } else {
      clickedBtn.classList.remove('correct');
      clickedBtn.classList.add('wrong');
      streak = 0;
      feedbackEl.textContent = '✗ Wrong — highlighted the answer';
      feedbackEl.className = 'feedback wrong';
    }

    nextBtn.classList.add('visible');
  }

  nextBtn.addEventListener('click', newRound);

  newRound();
</script>
</body>
</html>
